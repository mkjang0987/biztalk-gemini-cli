<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼 업무 말투 변환기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💼 업무 말투 변환기</h1>
            <p>전달하고 싶은 내용을 입력하면 적절한 비즈니스 언어로 바꿔드립니다.</p>
        </header>

        <main>
            <section class="selection-section">
                <h3>받는 사람 선택</h3>
                <div class="target-options">
                    <label class="target-card">
                        <input type="radio" name="target" value="boss" checked>
                        <span class="card-content">👔 상사/임원</span>
                    </label>
                    <label class="target-card">
                        <input type="radio" name="target" value="colleague">
                        <span class="card-content">🤝 타팀 동료</span>
                    </label>
                    <label class="target-card">
                        <input type="radio" name="target" value="client">
                        <span class="card-content">🌐 고객/외부</span>
                    </label>
                    <label class="target-card">
                        <input type="radio" name="target" value="team">
                        <span class="card-content">👥 팀 내 동료</span>
                    </label>
                </div>
            </section>

            <section class="input-section">
                <h3>하고 싶은 말</h3>
                <textarea id="inputText" placeholder="내용을 입력해 주세요. (예: 내일까지 보고서 제출 어려울 것 같음)"></textarea>
                <button id="convertBtn">변환하기</button>
            </section>

            <section class="output-section" id="outputArea" style="display: none;">
                <div class="output-header">
                    <h3>변환 결과</h3>
                    <button id="copyBtn">📋 복사하기</button>
                </div>
                <div id="outputText" class="result-box"></div>
            </section>

            <div id="loading" class="loading-overlay" style="display: none;">
                <div class="loader"></div>
                <p>AI가 말투를 정성스럽게 고치고 있어요...</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 업무 말투 변환기 | Powered by Upstage Solar-Pro2</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
